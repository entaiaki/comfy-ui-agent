  - key: negative_text
    title: Negative Prompt
    title_zh: 反向提示词
    aliases: [negative prompt, negative, 反向提示词, 负面提示词, blurry, low quality, artifact]
    targets: [negative_prompt.text]
    goals: [less_blurry, fewer_artifacts, cleaner]
    capabilities: [artifact_suppression]
    description: Negative prompt can suppress common defects, but overloading it is less reliable than fixing model/sampler/prompt structure.
    description_zh: 反向提示词能压制常见缺陷，但堆太多并不稳定；严重问题仍应检查模型、采样器和正向提示词结构。
    recommendations:
      - target: negative_prompt.text
        action: append_quality_negatives
        when_goal: cleaner
        value_hint: blurry, low quality, artifacts, deformed
